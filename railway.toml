[deploy]
startCommand = "python -m app.bootstrap && python -c \"from app.db import SessionLocal, Agent, Holding, Trade, PerformanceSnapshot; db = SessionLocal(); db.query(Trade).delete(); db.query(Holding).delete(); db.query(PerformanceSnapshot).delete(); [setattr(a, 'cash', 100000) or setattr(a, 'starting_capital', 100000) or setattr(a, 'last_trade_at', None) for a in db.query(Agent).all()]; db.commit(); db.close(); print('Reset complete')\" && python -m app.run_once trade short_term && python -m app.run_once trade mid_term && python -m app.run_once trade long_term && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
